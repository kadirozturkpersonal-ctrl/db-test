name: ECHR Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

concurrency:
  group: echr-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max - GitHub free tier limit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: ./db-old
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./db-old
        run: npx playwright install chromium
      
      - name: Run scraper
        working-directory: ./db-old
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MAX_CONSECUTIVE_EMPTY: '500'
          MAX_RUNTIME_MINUTES: '330'
          SAFE_STOP_BUFFER_MINUTES: '5'
          SCRAPER_STATE_FILE: './scraper-state.json'
        run: node monthly-scraper.js

      - name: Persist scraper checkpoint
        if: always()
        run: |
          if [ -n "$(git status --porcelain -- db-old/scraper-state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add db-old/scraper-state.json
            git commit -m "chore: update ECHR scraper checkpoint [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          else
            echo "No checkpoint changes to persist."
          fi
      
      - name: Upload logs (if job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: db-old/*.log
